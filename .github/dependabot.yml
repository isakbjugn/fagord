version: 2
updates:
  # Maintain npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Vent litt over pnpm sin minimumReleaseAge (3 dager) før PR-er åpnes,
    # slik at Dependabot ikke foreslår versjoner som CI-bygget vil underkjenne.
    cooldown:
      default-days: 4
    groups:
      # Group all patch and minor updates together
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      react-router:
        patterns:
          - "react-router"
          - "@react-router/*"
        update-types:
          - "major"
    # Security updates should always be created
    versioning-strategy: increase

  # Maintain GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
