<svg width="1250" height="600" viewBox="0 0 1250 600" xmlns="http://www.w3.org/2000/svg" fill="#ffffff"
     fill-rule="evenodd">
    <defs>
        <g id="f-base">
            <rect x="118" y="0" width="82" height="40" />
            <rect x="0" y="118" width="40" height="302" />
            <g transform="translate(120 120)" clip-path="url(#f-cut)">
                <circle cx="0" cy="0" r="100" fill="none" stroke="#ffffff" stroke-width="40" />
            </g>
        </g>
        <g id="angle">
            <rect x="0" y="0" width="40" height="140" />
            <rect x="-100" y="0" width="140" height="40" />
        </g>
        <clipPath id="a-cut">
            <rect x="-120" y="-360" width="220" height="720" />
        </clipPath>
        <clipPath id="f-cut">
            <rect x="-120" y="-120" width="120" height="120" />
        </clipPath>
        <clipPath id="r-cut">
            <rect x="-90" y="-120" width="120" height="80" />
        </clipPath>
    </defs>

    <g transform="translate(260 300)" clip-path="url(#a-cut)">
        <rect x="60" y="-120" width="40" height="240" />
        <circle cx="0" cy="0" r="100" fill="none" stroke="#ffffff" stroke-width="40" />
    </g>

    <g>
        <use href="#f-base" />
        <rect x="40" y="180" width="80" height="40" />

        <use href="#angle" transform="translate(560 0)" />

        <g transform="translate(500 300)" clip-path="url(#a-cut)">
            <circle cx="0" cy="0" r="100" fill="none" stroke="#ffffff" stroke-width="40" />
        </g>

        <use href="#f-base" transform="rotate(180 300 300)" />

        <use href="#angle" transform="rotate(180 300 300) translate(560 0)" />
    </g>

    <g transform="translate(750 300)">
        <circle cx="0" cy="0" r="100" fill="none" stroke="#ffffff" stroke-width="40" />

        <g transform="translate(250 0)">
            <rect x="-100" y="-120" width="40" height="240" />
            <g clip-path="url(#r-cut)">
                <circle cx="0" cy="0" r="100" fill="none" stroke="#ffffff" stroke-width="40" />
            </g>
        </g>

        <g transform="translate(400 0)" clip-path="url(#a-cut)">
            <rect x="60" y="-300" width="40" height="420" />
            <circle cx="0" cy="0" r="100" fill="none" stroke="#ffffff" stroke-width="40" />
        </g>
    </g>
</svg>
